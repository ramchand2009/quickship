name: Validate mobile OpenAPI

on:
  pull_request:
    paths:
      - "QuickShip_SaaS_V4_Enterprise_Engineering_Handbook/docs/08_api/**"
      - ".github/workflows/validate-mobile-openapi.yml"
  push:
    paths:
      - "QuickShip_SaaS_V4_Enterprise_Engineering_Handbook/docs/08_api/**"
      - ".github/workflows/validate-mobile-openapi.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Validate the mobile API contract
        run: >-
          npx --yes @redocly/cli@2.39.0 lint
          QuickShip_SaaS_V4_Enterprise_Engineering_Handbook/docs/08_api/mobile_phase1_openapi.yaml
      - name: Prove invalid contracts fail the gate
        shell: bash
        run: |
          if npx --yes @redocly/cli@2.39.0 lint QuickShip_SaaS_V4_Enterprise_Engineering_Handbook/docs/08_api/tests/invalid_openapi.yaml; then
            echo "Expected the invalid OpenAPI fixture to fail validation."
            exit 1
          fi
