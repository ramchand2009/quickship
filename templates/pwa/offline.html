{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="{{ theme_color }}">
    <title>{{ short_name }} | Offline</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f7fa;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #5f6b7a;
            --accent: {{ theme_color }};
            --border: #d8dee8;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            background:
                radial-gradient(circle at top, rgba(37, 49, 66, 0.08), transparent 36%),
                var(--bg);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .offline-card {
            width: min(100%, 420px);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 18px 50px rgba(17, 24, 39, 0.08);
            padding: 28px 24px;
            text-align: center;
        }

        .brand-mark {
            width: 88px;
            height: 88px;
            border-radius: 24px;
            margin: 0 auto 18px;
            background: rgba(37, 49, 66, 0.08);
            display: grid;
            place-items: center;
        }

        .brand-mark img {
            width: 58px;
            height: 58px;
            object-fit: contain;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 1.7rem;
        }

        p {
            margin: 0 0 12px;
            line-height: 1.6;
            color: var(--muted);
        }

        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .btn {
            appearance: none;
            border: 0;
            border-radius: 999px;
            padding: 12px 18px;
            font: inherit;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-secondary {
            background: #e8edf3;
            color: var(--text);
        }
    </style>
</head>
<body>
    <main class="offline-card">
        <div class="brand-mark">
            <img src="{% static 'assets/images/mathukai-logo.png' %}" alt="{{ short_name }} logo">
        </div>
        <h1>You’re offline</h1>
        <p>{{ app_name }} is installed and ready, but this screen needs an internet connection to load fresh operational data.</p>
        <p>Reconnect and tap reload to continue with orders, stock, and shipping updates.</p>
        <div class="actions">
            <button class="btn btn-primary" type="button" onclick="window.location.reload()">Reload</button>
            <a class="btn btn-secondary" href="{% url 'home' %}">Try Home</a>
        </div>
    </main>
</body>
</html>
