{% if pending_product_change_notification_count %}
    {% if is_super_admin %}
        <a href="{% url 'product_change_requests' %}" class="ops-mobile-topbar-control" aria-label="{{ pending_product_change_notification_count }} pending product approval notifications">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9M10 21h4"/></svg>
            <span class="ops-mobile-notification-badge">{{ pending_product_change_notification_count }}</span>
        </a>
    {% else %}
        <a href="{% url 'my_product_change_requests' %}" class="ops-mobile-topbar-control" aria-label="{{ pending_product_change_notification_count }} pending product request notifications">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9M10 21h4"/></svg>
            <span class="ops-mobile-notification-badge">{{ pending_product_change_notification_count }}</span>
        </a>
    {% endif %}
{% else %}
    <span class="ops-mobile-topbar-control"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9M10 21h4"/></svg></span>
{% endif %}
