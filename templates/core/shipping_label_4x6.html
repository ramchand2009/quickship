<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4x6 Shipping Label {{ order.shiprocket_order_id }}</title>
    <style>
        @page {
            size: 4in 6in;
            margin: 0;
        }

        * {
            box-sizing: border-box;
        }

        html {
            background: #e5e7eb;
        }

        body {
            margin: 0;
            padding: 16px;
            font-family: Arial, sans-serif;
            color: #111827;
            font-size: 12px;
            line-height: 1.35;
        }

        .actions {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .actions button,
        .actions a,
        .actions span {
            border: 1px solid #111827;
            background: #fff;
            color: #111827;
            padding: 8px 12px;
            font-size: 12px;
            text-decoration: none;
        }

        .actions button {
            cursor: pointer;
        }

        .label-page {
            width: 4in;
            min-height: 6in;
            margin: 0 auto;
            background: #fff;
            box-shadow: 0 14px 32px rgba(15, 23, 42, 0.18);
            padding: 0.18in;
        }

        .label-shell {
            min-height: calc(6in - 0.36in);
            border: 1.5px solid #111827;
            padding: 0.14in;
            display: flex;
            flex-direction: column;
            gap: 0.14in;
        }

        .label-header {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            border-bottom: 1.5px solid #111827;
            padding-bottom: 0.1in;
        }

        .label-title {
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .label-order-id {
            margin-top: 4px;
            font-size: 13px;
            font-weight: 700;
        }

        .label-meta {
            text-align: right;
            font-size: 11px;
            line-height: 1.45;
        }

        .label-section {
            border: 1px solid #111827;
            padding: 0.11in;
        }

        .ship-to-section {
            flex: 1;
        }

        .section-title {
            margin-bottom: 0.08in;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .party-name {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 0.05in;
        }

        .line + .line {
            margin-top: 4px;
        }

        .strong-line {
            font-weight: 700;
            font-size: 14px;
        }

        @media print {
            html,
            body {
                background: #fff;
            }

            body {
                padding: 0;
            }

            .actions {
                display: none;
            }

            .label-page {
                box-shadow: none;
                margin: 0;
            }
        }
    </style>
</head>
<body>
    <div class="actions">
        <button type="button" id="printLabelButton" data-track-url="{% url 'track_shipping_label_print' order.pk %}">
            Print 4x6 Label
        </button>
        <a href="{% url 'order_detail' order.pk %}">Back</a>
        <span>Use 4x6 thermal label media with scale set to 100%</span>
    </div>
    <input type="hidden" id="csrfToken" value="{{ csrf_token }}">

    <div class="label-page">
        {% include "core/_shipping_label_content.html" with order=order sender=sender %}
    </div>

    <script>
    (function () {
        const printButton = document.getElementById("printLabelButton");
        const csrfTokenInput = document.getElementById("csrfToken");
        if (!printButton || !csrfTokenInput) {
            return;
        }

        printButton.addEventListener("click", async function () {
            const trackUrl = printButton.getAttribute("data-track-url");
            const csrfToken = csrfTokenInput.value;
            try {
                await fetch(trackUrl, {
                    method: "POST",
                    headers: {
                        "X-CSRFToken": csrfToken,
                    },
                });
            } catch (error) {
                console.warn("Label print tracking failed.", error);
            }
            window.print();
        });
    })();
    </script>
</body>
</html>
