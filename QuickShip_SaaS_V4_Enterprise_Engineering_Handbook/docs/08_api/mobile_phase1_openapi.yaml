openapi: 3.1.0
info:
  title: Mathukai Operations Mobile API
  version: 1.0.0-draft
  summary: Phase 1 API contract for the Android mobile application.
  description: |
    Design contract for Mathukai Operations Phase 1. Django remains the source
    of truth for tenant access, permissions, order transitions, stock values,
    audit logging, and integration side effects. Barcode scanning and packing
    endpoints are intentionally excluded until Phase 2.
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: /api/v1
    description: Same-origin API; deployment host is environment-specific.
tags:
  - name: Authentication
    description: Mobile sessions, token rotation, and tenant selection.
  - name: Dashboard
    description: Role-aware operational summary.
  - name: Orders
    description: Tenant-scoped order reading and permitted Phase 1 actions.
  - name: Stock
    description: Read-only product and stock information.
  - name: Notifications
    description: Tenant-scoped notification inbox.
  - name: Devices
    description: Mobile push-token registrations.
security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      tags: [Authentication]
      operationId: login
      summary: Authenticate a user and create a mobile device session.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '429':
          $ref: '#/components/responses/RateLimitError'

  /auth/refresh:
    post:
      tags: [Authentication]
      operationId: refreshSession
      summary: Rotate a refresh token and issue a new token pair.
      description: Refresh-token reuse revokes the affected mobile session.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token rotation succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '429':
          $ref: '#/components/responses/RateLimitError'

  /auth/logout:
    post:
      tags: [Authentication]
      operationId: logout
      summary: Revoke the current mobile device session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Session revoked. The operation is idempotent.
        '401':
          $ref: '#/components/responses/AuthenticationError'

  /auth/me:
    get:
      tags: [Authentication]
      operationId: getCurrentSession
      summary: Return the current user, tenant, memberships, and permissions.
      responses:
        '200':
          description: Current session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '401':
          $ref: '#/components/responses/AuthenticationError'

  /auth/select-tenant:
    post:
      tags: [Authentication]
      operationId: selectTenant
      summary: Select an active tenant and rotate the mobile token pair.
      description: The server revalidates active membership before selection.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectTenantRequest'
      responses:
        '200':
          description: Tenant selected and credentials rotated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '403':
          $ref: '#/components/responses/PermissionError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /dashboard:
    get:
      tags: [Dashboard]
      operationId: getDashboard
      summary: Return a role-aware operational dashboard.
      responses:
        '200':
          description: Dashboard data scoped to the active tenant.
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
        '304':
          description: Cached dashboard data is current.
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/PermissionError'

  /orders:
    get:
      tags: [Orders]
      operationId: listOrders
      summary: List tenant-scoped orders using cursor pagination.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
        - name: search
          in: query
          schema:
            type: string
            maxLength: 160
          description: Search permitted order, customer, or tracking fields.
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/OrderStatusCode'
        - name: payment_state
          in: query
          schema:
            $ref: '#/components/schemas/PaymentStateCode'
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: updated_after
          in: query
          schema:
            type: string
            format: date-time
          description: Supports foreground synchronization of changed records.
      responses:
        '200':
          description: Order page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/PermissionError'

  /orders/{order_id}:
    get:
      tags: [Orders]
      operationId: getOrder
      summary: Return a tenant-scoped order and its currently allowed actions.
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetailResponse'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/PermissionError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /orders/{order_id}/status:
    post:
      tags: [Orders]
      operationId: updateOrderStatus
      summary: Apply a permitted order-status transition.
      description: |
        The target must be present in the order's allowed_actions response.
        Phase 1 clients must not initiate order_packed because barcode scanning
        and packing completion are Phase 2. Existing packed orders remain
        readable and may expose later permitted transitions.
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderStatusUpdateRequest'
      responses:
        '200':
          description: Status transition applied or an identical prior result returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderMutationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/PermissionError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/BusinessRuleError'

  /orders/{order_id}/payment-received:
    post:
      tags: [Orders]
      operationId: markOrderPaymentReceived
      summary: Mark payment received when exposed as an allowed action.
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentReceivedRequest'
      responses:
        '200':
          description: Payment state updated or identical prior result returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderMutationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/PermissionError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/BusinessRuleError'

  /products:
    get:
      tags: [Stock]
      operationId: listProducts
      summary: List read-only tenant products and stock quantities.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
        - name: search
          in: query
          schema:
            type: string
            maxLength: 160
        - name: stock_state
          in: query
          schema:
            $ref: '#/components/schemas/StockStateCode'
        - name: updated_after
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Product page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/PermissionError'

  /products/{product_id}:
    get:
      tags: [Stock]
      operationId: getProduct
      summary: Return read-only product and routing information.
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Product detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetailResponse'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/PermissionError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /stock/movements:
    get:
      tags: [Stock]
      operationId: listStockMovements
      summary: List read-only tenant stock movements.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
        - name: product_id
          in: query
          schema:
            type: integer
            minimum: 1
        - name: updated_after
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Stock movement page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockMovementListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/PermissionError'

  /notifications:
    get:
      tags: [Notifications]
      operationId: listNotifications
      summary: List role- and tenant-scoped mobile notifications.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
        - name: unread_only
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Notification page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/PermissionError'

  /notification-preferences:
    get:
      tags: [Notifications]
      operationId: getNotificationPreferences
      summary: Return effective notification preferences for the active tenant.
      responses:
        '200':
          description: Stored choices combined with mandatory server policy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreferencesResponse'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/PermissionError'
    patch:
      tags: [Notifications]
      operationId: updateNotificationPreferences
      summary: Update optional notification categories for the active tenant.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationPreferencesUpdateRequest'
      responses:
        '200':
          description: Updated effective preferences.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreferencesResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/PermissionError'

  /notifications/{notification_id}/read:
    post:
      tags: [Notifications]
      operationId: markNotificationRead
      summary: Mark a notification as read.
      parameters:
        - $ref: '#/components/parameters/NotificationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Updated notification.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/PermissionError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /devices/push-token:
    post:
      tags: [Devices]
      operationId: registerPushToken
      summary: Register or refresh the current installation's Expo push token.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushTokenRegistrationRequest'
      responses:
        '200':
          description: Existing registration refreshed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'
        '201':
          description: Device registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationError'

  /devices/{device_id}:
    delete:
      tags: [Devices]
      operationId: deleteDevice
      summary: Disable a push registration owned by the current user.
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '204':
          description: Device disabled or already absent.
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/PermissionError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Ten-minute access token scoped to the selected tenant.

  parameters:
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
        maxLength: 512
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Generated once per user intent and reused for safe retries.
    OrderId:
      name: order_id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    ProductId:
      name: product_id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    NotificationId:
      name: notification_id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    DeviceId:
      name: device_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    ValidationError:
      description: Request data is invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: validation_error
              message: Check the highlighted fields.
              fields:
                target_status: [This field is required.]
              retryable: false
            meta:
              request_id: req_01JZEXAMPLE
              server_time: '2026-07-19T10:00:00Z'
    AuthenticationError:
      description: Authentication is missing, expired, or revoked.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: authentication_required
              message: Sign in again to continue.
              fields: {}
              retryable: false
            meta:
              request_id: req_01JZEXAMPLE
              server_time: '2026-07-19T10:00:00Z'
    PermissionError:
      description: The current user or tenant cannot perform the operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: The resource is unavailable in the active tenant scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ConflictError:
      description: The resource changed or an idempotency key conflicts.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: order_version_conflict
              message: This order was updated by another user.
              fields: {}
              retryable: false
            meta:
              request_id: req_01JZEXAMPLE
              server_time: '2026-07-19T10:00:00Z'
    BusinessRuleError:
      description: The request is valid but violates the current business state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimitError:
      description: Too many requests.
      headers:
        Retry-After:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ResponseMeta:
      type: object
      required: [request_id, server_time]
      properties:
        request_id:
          type: string
        server_time:
          type: string
          format: date-time
        cache_expires_at:
          type: [string, 'null']
          format: date-time

    Pagination:
      type: object
      additionalProperties: false
      required: [next_cursor, has_more]
      properties:
        next_cursor:
          type: [string, 'null']
        has_more:
          type: boolean

    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error, meta]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message, fields, retryable]
          properties:
            code:
              type: string
            message:
              type: string
            fields:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
            retryable:
              type: boolean
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    LoginRequest:
      type: object
      additionalProperties: false
      required: [username, password, installation_id, platform, app_version]
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 150
        password:
          type: string
          minLength: 1
          maxLength: 1024
        installation_id:
          type: string
          format: uuid
        platform:
          type: string
          enum: [android]
        app_version:
          type: string
          maxLength: 32

    RefreshRequest:
      type: object
      additionalProperties: false
      required: [refresh_token, installation_id]
      properties:
        refresh_token:
          type: string
          minLength: 32
        installation_id:
          type: string
          format: uuid

    LogoutRequest:
      type: object
      additionalProperties: false
      required: [refresh_token, installation_id]
      properties:
        refresh_token:
          type: string
          minLength: 32
        installation_id:
          type: string
          format: uuid

    SelectTenantRequest:
      type: object
      additionalProperties: false
      required: [tenant_id, refresh_token]
      properties:
        tenant_id:
          type: integer
          minimum: 1
        refresh_token:
          type: string
          minLength: 32

    TokenPair:
      type: object
      additionalProperties: false
      required: [access_token, access_expires_at, refresh_token, refresh_expires_at]
      properties:
        access_token:
          type: string
        access_expires_at:
          type: string
          format: date-time
        refresh_token:
          type: string
        refresh_expires_at:
          type: string
          format: date-time

    TokenResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: '#/components/schemas/TokenPair'
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    UserIdentity:
      type: object
      additionalProperties: false
      required: [id, username, display_name]
      properties:
        id:
          type: integer
        username:
          type: string
        display_name:
          type: string
        email:
          type: [string, 'null']
          format: email

    TenantMembership:
      type: object
      additionalProperties: false
      required: [tenant_id, tenant_name, tenant_slug, role, role_label]
      properties:
        tenant_id:
          type: integer
        tenant_name:
          type: string
        tenant_slug:
          type: string
        role:
          type: string
          enum: [vendor_owner, vendor_operator, vendor_viewer, warehouse_operator]
        role_label:
          type: string

    Session:
      type: object
      additionalProperties: false
      required: [user, active_tenant, available_tenants, permissions]
      properties:
        user:
          $ref: '#/components/schemas/UserIdentity'
        active_tenant:
          oneOf:
            - $ref: '#/components/schemas/TenantMembership'
            - type: 'null'
        available_tenants:
          type: array
          items:
            $ref: '#/components/schemas/TenantMembership'
        permissions:
          type: array
          uniqueItems: true
          items:
            type: string
          example: [dashboard.view, orders.view, orders.update_status, stock.view]

    AuthPayload:
      type: object
      additionalProperties: false
      required: [tokens, session]
      properties:
        tokens:
          $ref: '#/components/schemas/TokenPair'
        session:
          $ref: '#/components/schemas/Session'

    AuthResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: '#/components/schemas/AuthPayload'
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    SessionResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: '#/components/schemas/Session'
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    DashboardMetric:
      type: object
      additionalProperties: false
      required: [key, label, value, destination]
      properties:
        key:
          type: string
          enum: [pending_orders, accepted_orders, attention_orders, unread_notifications, low_stock, routing_health]
        label:
          type: string
        value:
          type: integer
          minimum: 0
        destination:
          type: string
        tone:
          type: string
          enum: [neutral, attention, critical, positive]
          default: neutral

    DashboardAlert:
      type: object
      additionalProperties: false
      required: [id, type, title, message, destination, created_at]
      properties:
        id:
          type: string
        type:
          type: string
        title:
          type: string
        message:
          type: string
        destination:
          type: [string, 'null']
        created_at:
          type: string
          format: date-time

    Dashboard:
      type: object
      additionalProperties: false
      required: [metrics, alerts]
      properties:
        metrics:
          type: array
          items:
            $ref: '#/components/schemas/DashboardMetric'
        alerts:
          type: array
          items:
            $ref: '#/components/schemas/DashboardAlert'

    DashboardResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: '#/components/schemas/Dashboard'
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    OrderStatusCode:
      type: string
      enum:
        - new_order
        - order_accepted
        - order_packed
        - shipped
        - delivery_issue
        - out_for_delivery
        - delivered
        - completed
        - order_cancelled

    PaymentStateCode:
      type: string
      enum: [pending, received]

    LabeledStatus:
      type: object
      additionalProperties: false
      required: [code, label]
      properties:
        code:
          type: string
        label:
          type: string

    Money:
      type: object
      additionalProperties: false
      required: [amount, currency]
      properties:
        amount:
          type: string
          pattern: '^-?[0-9]+\.[0-9]{2}$'
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          example: INR

    OrderSummary:
      type: object
      required:
        - id
        - reference
        - source
        - status
        - payment_state
        - item_count
        - total
        - order_date
        - attention_required
        - version
        - updated_at
      properties:
        id:
          type: integer
        reference:
          type: string
        source:
          $ref: '#/components/schemas/LabeledStatus'
        status:
          $ref: '#/components/schemas/LabeledStatus'
        payment_state:
          $ref: '#/components/schemas/LabeledStatus'
        customer_display_name:
          type: [string, 'null']
          description: Masked or omitted according to field-level permissions.
        item_count:
          type: integer
          minimum: 0
        total:
          $ref: '#/components/schemas/Money'
        order_date:
          type: [string, 'null']
          format: date-time
        tracking_number:
          type: [string, 'null']
        attention_required:
          type: boolean
        version:
          type: string
          description: Opaque concurrency token derived by the server.
        updated_at:
          type: string
          format: date-time

    CustomerSummary:
      type: object
      additionalProperties: false
      required: [name, phone, email, delivery_address]
      properties:
        name:
          type: [string, 'null']
        phone:
          type: [string, 'null']
        email:
          type: [string, 'null']
          format: email
        delivery_address:
          type: [string, 'null']
        fields_masked:
          type: array
          items:
            type: string

    OrderItem:
      type: object
      additionalProperties: false
      required: [name, quantity, total]
      properties:
        product_id:
          type: [integer, 'null']
        name:
          type: string
        sku:
          type: [string, 'null']
        quantity:
          type: integer
          minimum: 1
        total:
          $ref: '#/components/schemas/Money'
        image_url:
          type: [string, 'null']
          format: uri

    AllowedAction:
      type: object
      additionalProperties: false
      required: [code, label, confirmation_required]
      properties:
        code:
          type: string
          enum: [update_status, mark_payment_received]
        label:
          type: string
        target_status:
          oneOf:
            - $ref: '#/components/schemas/OrderStatusCode'
            - type: 'null'
        confirmation_required:
          type: boolean
        reason_required:
          type: boolean
          default: false
        required_fields:
          type: array
          items:
            type: string

    OrderActivity:
      type: object
      additionalProperties: false
      required: [id, title, created_at]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: [string, 'null']
        actor_display_name:
          type: [string, 'null']
        previous_status:
          type: [string, 'null']
        current_status:
          type: [string, 'null']
        created_at:
          type: string
          format: date-time

    OrderDetail:
      unevaluatedProperties: false
      allOf:
        - $ref: '#/components/schemas/OrderSummary'
        - type: object
          required: [customer, items, courier_name, shipping_cost, allowed_actions, activity]
          properties:
            customer:
              $ref: '#/components/schemas/CustomerSummary'
            items:
              type: array
              items:
                $ref: '#/components/schemas/OrderItem'
            courier_name:
              type: [string, 'null']
            shipping_cost:
              $ref: '#/components/schemas/Money'
            payment_received_at:
              type: [string, 'null']
              format: date-time
            cancellation_reason:
              type: [string, 'null']
            cancellation_note:
              type: [string, 'null']
            allowed_actions:
              type: array
              items:
                $ref: '#/components/schemas/AllowedAction'
            activity:
              type: array
              items:
                $ref: '#/components/schemas/OrderActivity'

    OrderListResponse:
      type: object
      additionalProperties: false
      required: [data, pagination, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/OrderSummary'
        pagination:
          $ref: '#/components/schemas/Pagination'
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    OrderDetailResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: '#/components/schemas/OrderDetail'
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    CancellationReasonCode:
      type: string
      enum: [customer_request, payment_failed, out_of_stock, address_issue, courier_issue, other]

    OrderStatusUpdateRequest:
      type: object
      additionalProperties: false
      required: [target_status, expected_version]
      properties:
        target_status:
          $ref: '#/components/schemas/OrderStatusCode'
        expected_version:
          type: string
        courier_name:
          type: [string, 'null']
          maxLength: 160
        tracking_number:
          type: [string, 'null']
          maxLength: 128
        shipping_base_amount:
          type: [string, 'null']
          pattern: '^[0-9]+\.[0-9]{2}$'
        cancellation_reason:
          oneOf:
            - $ref: '#/components/schemas/CancellationReasonCode'
            - type: 'null'
        cancellation_note:
          type: [string, 'null']
          maxLength: 255

    PaymentReceivedRequest:
      type: object
      additionalProperties: false
      required: [expected_version, confirmed]
      properties:
        expected_version:
          type: string
        confirmed:
          type: boolean
          const: true

    MutationEffect:
      type: object
      additionalProperties: false
      required: [code, state]
      properties:
        code:
          type: string
          enum: [stock_sync, whatsapp_notification, woocommerce_sync]
        state:
          type: string
          enum: [completed, queued, skipped, warning]
        message:
          type: [string, 'null']

    OrderMutation:
      type: object
      additionalProperties: false
      required: [order, effects, replayed]
      properties:
        order:
          $ref: '#/components/schemas/OrderDetail'
        effects:
          type: array
          items:
            $ref: '#/components/schemas/MutationEffect'
        replayed:
          type: boolean

    OrderMutationResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: '#/components/schemas/OrderMutation'
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    StockStateCode:
      type: string
      enum: [in_stock, low_stock, out_of_stock]

    ProductSummary:
      type: object
      required: [id, name, sku, stock_quantity, stock_state, route_ready, is_active, updated_at]
      properties:
        id:
          type: integer
        name:
          type: string
        sku:
          type: string
        barcode:
          type: [string, 'null']
        image_url:
          type: [string, 'null']
          format: uri
        category:
          type: [string, 'null']
        stock_quantity:
          type: integer
        reorder_level:
          type: integer
          minimum: 0
        stock_state:
          $ref: '#/components/schemas/StockStateCode'
        route_ready:
          type: boolean
        is_active:
          type: boolean
        updated_at:
          type: string
          format: date-time

    ProductDetail:
      unevaluatedProperties: false
      allOf:
        - $ref: '#/components/schemas/ProductSummary'
        - type: object
          required: [prices, routing]
          properties:
            description:
              type: [string, 'null']
            prices:
              type: object
              additionalProperties: false
              properties:
                actual:
                  oneOf:
                    - $ref: '#/components/schemas/Money'
                    - type: 'null'
                regular:
                  oneOf:
                    - $ref: '#/components/schemas/Money'
                    - type: 'null'
                sale:
                  oneOf:
                    - $ref: '#/components/schemas/Money'
                    - type: 'null'
            routing:
              type: object
              additionalProperties: false
              required: [ready, woocommerce_product_id, woocommerce_variation_id]
              properties:
                ready:
                  type: boolean
                woocommerce_product_id:
                  type: [string, 'null']
                woocommerce_variation_id:
                  type: [string, 'null']

    ProductListResponse:
      type: object
      additionalProperties: false
      required: [data, pagination, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ProductSummary'
        pagination:
          $ref: '#/components/schemas/Pagination'
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    ProductDetailResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: '#/components/schemas/ProductDetail'
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    StockMovement:
      type: object
      additionalProperties: false
      required: [id, product_id, movement_type, quantity_delta, quantity_after, created_at]
      properties:
        id:
          type: integer
        product_id:
          type: integer
        order_id:
          type: [integer, 'null']
        movement_type:
          $ref: '#/components/schemas/LabeledStatus'
        quantity_delta:
          type: integer
        quantity_after:
          type: integer
        note:
          type: [string, 'null']
        actor_display_name:
          type: [string, 'null']
        created_at:
          type: string
          format: date-time

    StockMovementListResponse:
      type: object
      additionalProperties: false
      required: [data, pagination, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/StockMovement'
        pagination:
          $ref: '#/components/schemas/Pagination'
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    NotificationCategory:
      type: string
      enum: [new_order, order_attention, status_change, routing_alert, integration_alert]

    Notification:
      type: object
      additionalProperties: false
      required: [id, category, title, message, is_read, created_at]
      properties:
        id:
          type: integer
        category:
          $ref: '#/components/schemas/NotificationCategory'
        title:
          type: string
        message:
          type: string
        destination:
          type: [string, 'null']
          description: Internal mobile route, never an unvalidated external URL.
        order_id:
          type: [integer, 'null']
        is_read:
          type: boolean
        read_at:
          type: [string, 'null']
          format: date-time
        created_at:
          type: string
          format: date-time

    NotificationListResponse:
      type: object
      additionalProperties: false
      required: [data, pagination, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        pagination:
          $ref: '#/components/schemas/Pagination'
        meta:
          allOf:
            - $ref: '#/components/schemas/ResponseMeta'
            - type: object
              properties:
                unread_count:
                  type: integer
                  minimum: 0

    NotificationPreference:
      type: object
      additionalProperties: false
      required: [category, enabled, mandatory]
      properties:
        category:
          $ref: '#/components/schemas/NotificationCategory'
        enabled:
          type: boolean
        mandatory:
          type: boolean
          description: Mandatory categories cannot be disabled by the user.

    NotificationPreferenceUpdate:
      type: object
      additionalProperties: false
      required: [category, enabled]
      properties:
        category:
          $ref: '#/components/schemas/NotificationCategory'
        enabled:
          type: boolean

    NotificationPreferencesUpdateRequest:
      type: object
      additionalProperties: false
      required: [preferences]
      properties:
        preferences:
          type: array
          minItems: 1
          maxItems: 5
          items:
            $ref: '#/components/schemas/NotificationPreferenceUpdate'

    NotificationPreferencesResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/NotificationPreference'
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    NotificationResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: '#/components/schemas/Notification'
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    PushTokenRegistrationRequest:
      type: object
      additionalProperties: false
      required: [installation_id, platform, expo_push_token, app_version]
      properties:
        installation_id:
          type: string
          format: uuid
        platform:
          type: string
          enum: [android]
        expo_push_token:
          type: string
          minLength: 16
          maxLength: 512
        app_version:
          type: string
          maxLength: 32
        device_name:
          type: [string, 'null']
          maxLength: 120

    Device:
      type: object
      additionalProperties: false
      required: [id, installation_id, platform, app_version, enabled, last_seen_at]
      properties:
        id:
          type: string
          format: uuid
        installation_id:
          type: string
          format: uuid
        platform:
          type: string
          enum: [android]
        app_version:
          type: string
        enabled:
          type: boolean
        last_seen_at:
          type: string
          format: date-time

    DeviceResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: '#/components/schemas/Device'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
